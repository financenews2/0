<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11시 급등주 공개합니다.</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#f5f5f5;
}

.hot-wrap{
  max-width:760px;
  margin:30px auto;
  padding:38px 24px;
  border-radius:22px;
  background:linear-gradient(135deg,#111111 0%,#1a1a1a 50%,#2a0505 100%);
  color:#ffffff;
  text-align:center;
  font-family:'Pretendard','Noto Sans KR',sans-serif;
  box-shadow:0 18px 40px rgba(0,0,0,.28);
  border:1px solid rgba(255,255,255,.10);
}

.hot-image{
  width:100%;
  max-width:650px;
  border-radius:18px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.hot-badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  background:#ff2d20;
  color:#ffffff;
  font-size:13px;
  font-weight:800;
  margin-bottom:16px;
}

.hot-title{
  margin:0 0 14px;
  font-size:36px;
  line-height:1.25;
  font-weight:900;
  letter-spacing:-1px;
  color:#ffffff;
}

.hot-desc{
  margin:0 0 24px;
  font-size:16px;
  line-height:1.7;
  color:#ffffff;
  font-weight:500;
}

.hot-desc strong{
  color:#ffd400;
  font-weight:900;
}

.hot-btn{
  display:inline-block;
  padding:16px 28px;
  border-radius:14px;
  background:linear-gradient(135deg,#ff3b30 0%,#ff6a00 100%);
  color:#ffffff !important;
  text-decoration:none !important;
  font-size:16px;
  font-weight:900;
  box-shadow:0 12px 24px rgba(255,90,40,.32);
}

.timer{
  margin-top:15px;
  font-size:14px;
  color:#ffd400;
  font-weight:700;
}

@media screen and (max-width:768px){
  .hot-wrap{
    padding:30px 18px;
  }

  .hot-title{
    font-size:28px;
  }

  .hot-desc{
    font-size:15px;
  }

  .hot-btn{
    display:block;
    width:100%;
    box-sizing:border-box;
  }
}
</style>
</head>

<body>

<div class="hot-wrap">

  <img src="https://i.ibb.co/Cs0sfnRD/5D.jpg" alt="급등주 공개" class="hot-image">

  <div class="hot-badge">실시간 공개</div>

  <h2 class="hot-title">11시 급등주 공개합니다.</h2>

  <p class="hot-desc">
    오늘 시장 흐름과 주요 이슈를 정리했습니다.<br>
    <strong>잠시 후 텔레그램 채팅방으로 이동합니다.</strong>
  </p>

  <a href="https://open.kakao.com/o/gXaAUYzi" target="_blank" class="hot-btn">
    지금 바로 입장하기
  </a>

  <div class="timer">
    1.5초 후 자동 이동됩니다...
  </div>

</div>

<script>
setTimeout(function(){
  window.location.href = "https://open.kakao.com/o/gXaAUYzi";
},1500);
</script>

</body>
</html>
